<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄对决 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #f39c12;
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
            margin-bottom: 10px;
        }

        header p {
            color: #a0a0a0;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-tab.active {
            background: rgba(243, 156, 18, 0.3);
            border-color: #f39c12;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .hero-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .hero-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .hero-title {
            flex: 1;
        }

        .hero-title h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .hero-title .enabled {
            font-size: 0.8rem;
            color: #2ecc71;
        }

        .hero-title .disabled {
            font-size: 0.8rem;
            color: #e74c3c;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f39c12;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .btn-reset {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .toast.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .sound-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .sound-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
        }

        .sound-item label {
            display: block;
            font-size: 0.9rem;
            color: #f39c12;
            margin-bottom: 8px;
        }

        .sound-item input {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
        }

        .sound-item input:focus {
            outline: none;
            border-color: #f39c12;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #f39c12;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #f39c12;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .hero-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回游戏</a>

        <header>
            <h1>⚔️ 管理后台 ⚔️</h1>
            <p>配置英雄属性、技能数值和音效设置</p>
        </header>

        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="heroes">英雄管理</button>
            <button class="nav-tab" data-tab="sounds">音效配置</button>
            <button class="nav-tab" data-tab="stats">数据统计</button>
        </nav>

        <!-- 英雄管理 -->
        <section id="heroes" class="section active">
            <div class="hero-grid" id="heroGrid"></div>
            <button class="btn btn-reset" onclick="resetConfig()" style="margin-top: 30px;">重置所有配置为默认</button>
        </section>

        <!-- 音效配置 -->
        <section id="sounds" class="section">
            <div class="sound-list" id="soundList"></div>
            <button class="btn btn-save" onclick="saveAllSounds()" style="margin-top: 20px;">保存所有音效配置</button>
        </section>

        <!-- 数据统计 -->
        <section id="stats" class="section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="value" id="heroCount">8</div>
                    <div class="label">英雄数量</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="soundCount">17</div>
                    <div class="label">音效数量</div>
                </div>
                <div class="stat-card">
                    <div class="value">v1.0.0</div>
                    <div class="label">版本号</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="lastUpdate">-</div>
                    <div class="label">最后更新</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let config = null;

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 加载配置
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                if (data.success) {
                    config = data.data;
                    renderHeroes();
                    renderSounds();
                    updateStats();
                }
            } catch (e) {
                showToast('加载配置失败', 'error');
            }
        }

        // 渲染英雄列表
        function renderHeroes() {
            const grid = document.getElementById('heroGrid');
            grid.innerHTML = '';

            for (const [id, hero] of Object.entries(config.heroes)) {
                const card = document.createElement('div');
                card.className = 'hero-card';
                card.innerHTML = `
                    <div class="hero-header">
                        <div class="hero-ball" style="background: ${hero.color}; box-shadow: 0 0 15px ${hero.color}50;">
                            ${hero.weaponEmoji}
                        </div>
                        <div class="hero-title">
                            <h3>${hero.name}</h3>
                            <span class="${hero.enabled ? 'enabled' : 'disabled'}">
                                ${hero.enabled ? '✓ 已启用' : '✗ 已禁用'}
                            </span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>名称</label>
                        <input type="text" id="name_${id}" value="${hero.name}">
                    </div>
                    <div class="form-group">
                        <label>简介</label>
                        <textarea id="desc_${id}" rows="2">${hero.description}</textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>血量 (hp)</label>
                            <input type="number" id="hp_${id}" value="${hero.hp}">
                        </div>
                        <div class="form-group">
                            <label>攻击力 (attack)</label>
                            <input type="number" id="attack_${id}" value="${hero.attack}">
                        </div>
                        <div class="form-group">
                            <label>攻击范围</label>
                            <input type="number" id="attackRange_${id}" value="${hero.attackRange}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>攻击冷却 (ms)</label>
                            <input type="number" id="attackCooldown_${id}" value="${hero.attackCooldown}">
                        </div>
                        <div class="form-group">
                            <label>移动速度</label>
                            <input type="number" step="0.1" id="speed_${id}" value="${hero.speed}">
                        </div>
                        <div class="form-group">
                            <label>碰撞半径</label>
                            <input type="number" id="radius_${id}" value="${hero.radius}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>颜色</label>
                            <input type="color" id="color_${id}" value="${hero.color}">
                        </div>
                        <div class="form-group">
                            <label>武器图标</label>
                            <input type="text" id="weaponEmoji_${id}" value="${hero.weaponEmoji}">
                        </div>
                        <div class="form-group">
                            <label>启用状态</label>
                            <select id="enabled_${id}">
                                <option value="true" ${hero.enabled ? 'selected' : ''}>启用</option>
                                <option value="false" ${!hero.enabled ? 'selected' : ''}>禁用</option>
                            </select>
                        </div>
                    </div>
                    ${id === 'lixin' ? `
                    <div class="form-row">
                        <div class="form-group">
                            <label>蓄力时间 (ms)</label>
                            <input type="number" id="chargeTime_${id}" value="${hero.chargeTime || 1200}">
                        </div>
                        <div class="form-group">
                            <label>位移距离</label>
                            <input type="number" id="dashDistance_${id}" value="${hero.dashDistance || 250}">
                        </div>
                        <div class="form-group">
                            <label>冷却时间 (ms)</label>
                            <input type="number" id="cooldownTime_${id}" value="${hero.cooldownTime || 2500}">
                        </div>
                    </div>
                    ` : ''}
                    ${id === 'xishi' ? `
                    <div class="form-row">
                        <div class="form-group">
                            <label>法球撞击伤害</label>
                            <input type="number" id="xishiBallDamage_${id}" value="${hero.xishiBallDamage || 100}">
                        </div>
                        <div class="form-group">
                            <label>持续伤害</label>
                            <input type="number" id="xishiBallTickDamage_${id}" value="${hero.xishiBallTickDamage || 10}">
                        </div>
                        <div class="form-group">
                            <label>爆炸伤害</label>
                            <input type="number" id="xishiBallExplosionDamage_${id}" value="${hero.xishiBallExplosionDamage || 150}">
                        </div>
                    </div>
                    ` : ''}
                    <button class="btn btn-save" onclick="saveHero('${id}')">保存 ${hero.name}</button>
                `;
                grid.appendChild(card);
            }
        }

        // 保存单个英雄
        async function saveHero(heroId) {
            const hero = { ...config.heroes[heroId] };

            hero.name = document.getElementById(`name_${heroId}`).value;
            hero.description = document.getElementById(`desc_${heroId}`).value;
            hero.hp = parseInt(document.getElementById(`hp_${heroId}`).value);
            hero.attack = parseInt(document.getElementById(`attack_${heroId}`).value);
            hero.attackRange = parseInt(document.getElementById(`attackRange_${heroId}`).value);
            hero.attackCooldown = parseInt(document.getElementById(`attackCooldown_${heroId}`).value);
            hero.speed = parseFloat(document.getElementById(`speed_${heroId}`).value);
            hero.radius = parseInt(document.getElementById(`radius_${heroId}`).value);
            hero.color = document.getElementById(`color_${heroId}`).value;
            hero.weaponEmoji = document.getElementById(`weaponEmoji_${heroId}`).value;
            hero.enabled = document.getElementById(`enabled_${heroId}`).value === 'true';

            if (heroId === 'lixin') {
                hero.chargeTime = parseInt(document.getElementById(`chargeTime_${heroId}`).value);
                hero.dashDistance = parseInt(document.getElementById(`dashDistance_${heroId}`).value);
                hero.cooldownTime = parseInt(document.getElementById(`cooldownTime_${heroId}`).value);
            }

            if (heroId === 'xishi') {
                hero.xishiBallDamage = parseInt(document.getElementById(`xishiBallDamage_${heroId}`).value);
                hero.xishiBallTickDamage = parseInt(document.getElementById(`xishiBallTickDamage_${heroId}`).value);
                hero.xishiBallExplosionDamage = parseInt(document.getElementById(`xishiBallExplosionDamage_${heroId}`).value);
            }

            try {
                const res = await fetch(`/api/hero/${heroId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(hero)
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`${hero.name} 保存成功`);
                    config.heroes[heroId] = hero;
                    renderHeroes();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('保存失败', 'error');
            }
        }

        // 渲染音效列表
        function renderSounds() {
            const list = document.getElementById('soundList');
            list.innerHTML = '';

            for (const [id, url] of Object.entries(config.sounds)) {
                const item = document.createElement('div');
                item.className = 'sound-item';
                item.innerHTML = `
                    <label>${id}</label>
                    <input type="text" id="sound_${id}" value="${url}">
                `;
                list.appendChild(item);
            }
        }

        // 保存所有音效
        async function saveAllSounds() {
            for (const [id] of Object.entries(config.sounds)) {
                const url = document.getElementById(`sound_${id}`).value;
                config.sounds[id] = url;

                try {
                    await fetch(`/api/sound/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url })
                    });
                } catch (e) {
                    console.error(`音效 ${id} 保存失败`);
                }
            }
            showToast('所有音效配置已保存');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('heroCount').textContent = Object.keys(config.heroes).length;
            document.getElementById('soundCount').textContent = Object.keys(config.sounds).length;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString();
        }

        // 重置配置
        async function resetConfig() {
            if (!confirm('确定要重置所有配置吗？此操作不可撤销。')) return;

            try {
                const res = await fetch('/api/reset', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('配置已重置');
                    loadConfig();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('重置失败', 'error');
            }
        }

        // 标签页切换
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // 初始化
        loadConfig();
    </script>
</body>
</html>
