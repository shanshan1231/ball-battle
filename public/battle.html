<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小球对战擂台 - 战斗中</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="battle-container">
        <!-- 顶部状态栏 -->
        <header class="battle-header">
            <!-- A方状态 -->
            <div class="player-status player-a">
                <div class="player-ball" id="ballA"></div>
                <div class="player-info">
                    <span class="player-name" id="nameA">战士A</span>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="hpBarA"></div>
                        <span class="hp-text" id="hpTextA">120/120</span>
                    </div>
                </div>
            </div>

            <!-- 中间控制区 -->
            <div class="battle-center">
                <div class="battle-vs">VS</div>

                <!-- 控制按钮组 -->
                <div class="control-buttons">
                    <!-- 暂停按钮 -->
                    <button id="pauseBtn" class="btn btn-pause">⏸️ 暂停</button>

                    <!-- 速度控制 -->
                    <div class="speed-control">
                        <span class="speed-label">速度:</span>
                        <button class="btn btn-speed" data-speed="1">1x</button>
                        <button class="btn btn-speed" data-speed="2">2x</button>
                        <button class="btn btn-speed" data-speed="4">4x</button>
                        <button class="btn btn-speed" data-speed="8">8x</button>
                    </div>

                    <!-- 结束对局按钮 -->
                    <button id="quitBtn" class="btn btn-quit">🚪 结束对局</button>
                </div>
            </div>

            <!-- B方状态 -->
            <div class="player-status player-b">
                <div class="player-info">
                    <span class="player-name" id="nameB">弓手B</span>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="hpBarB"></div>
                        <span class="hp-text" id="hpTextB">80/80</span>
                    </div>
                </div>
                <div class="player-ball" id="ballB"></div>
            </div>
        </header>

        <!-- 战斗区域 + 战况日志 -->
        <div class="battle-main">
            <!-- 战斗区域 -->
            <div class="battle-arena">
                <canvas id="battleCanvas" width="704" height="704"></canvas>
            </div>

            <!-- 战况日志面板 -->
            <div class="battle-log-panel">
                <div class="log-header">📜 战况日志</div>
                <div class="log-content" id="logContent"></div>
            </div>
        </div>

        <!-- 战斗提示 -->
        <div class="battle-tip" id="battleTip">
            战斗开始！
        </div>

        <!-- 加载提示 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <p>正在连接服务器...</p>
        </div>
    </div>

    <script src="js/battle.js"></script>
</body>
</html>
